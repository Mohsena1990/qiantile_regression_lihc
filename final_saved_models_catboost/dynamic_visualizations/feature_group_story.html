<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Feature Group Story</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: linear-gradient(180deg, #eef5db, #dfe7fd); color: #102027; }
    .wrap { max-width: 1150px; margin: 0 auto; padding: 32px 24px 56px; }
    h1 { margin-bottom: 10px; }
    .tabs { display: flex; flex-wrap: wrap; gap: 10px; margin: 20px 0; }
    .tab { background: white; border: 2px solid #c5d6e8; border-radius: 999px; padding: 10px 14px; cursor: pointer; }
    .tab.active { border-color: #1e88e5; color: #1e88e5; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; }
    .card { background: rgba(255,255,255,0.88); border-radius: 16px; padding: 16px; box-shadow: 0 10px 24px rgba(16,32,39,0.08); }
    .meta { margin-top: 10px; color: #455a64; font-size: 14px; line-height: 1.45; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dynamic Feature-Group Story</h1>
    <p>This lightweight HTML view helps explain how the structural, contextual, socioeconomic, and quantile-regression feature sets are composed and how complete they are in the processed dataset.</p>
    <div id="tabs" class="tabs"></div>
    <div id="grid" class="grid"></div>
  </div>
  <script>
    const story = [{"group": "Base structural", "features": [{"feature": "floor_area", "missing_pct": 0.0, "unique_values": 6, "mean": 89.5855304039059, "std": 42.39316906241871}, {"feature": "house_age", "missing_pct": 0.0, "unique_values": 8, "mean": 43.0110075454949, "std": 18.97471084234113}, {"feature": "dwelling_type", "missing_pct": 0.0, "unique_values": 4, "mean": 2.356946293830448, "std": 1.2976609390311185}, {"feature": "insulation_count", "missing_pct": 0.0, "unique_values": 4, "mean": 0.6898357745228584, "std": 0.8520887498302377}, {"feature": "main_heating_source", "missing_pct": 0.0, "unique_values": 11, "mean": null, "std": null}, {"feature": "heating_control", "missing_pct": 0.0, "unique_values": 4, "mean": 2.472791833111407, "std": 1.0941115756585862}, {"feature": "household_size", "missing_pct": 0.0, "unique_values": 23, "mean": 2.709098979138926, "std": 1.6055909660857792}, {"feature": "children_present", "missing_pct": 0.0, "unique_values": 2, "mean": 0.3983133599644918, "std": 0.489572368354745}, {"feature": "elderly_present", "missing_pct": 0.0, "unique_values": 2, "mean": 0.4188193519751442, "std": 0.4933875879188689}]}, {"group": "Context", "features": [{"feature": "Country", "missing_pct": 0.0, "unique_values": 11, "mean": 5.839946737683089, "std": 3.175926291597913}, {"feature": "SettlementSize", "missing_pct": 42.04, "unique_values": 5, "mean": 3.0716801960483995, "std": 1.1391037006554847}, {"feature": "S6", "missing_pct": 0.0, "unique_values": 6, "mean": 2.8237905015534843, "std": 1.1807983799366637}, {"feature": "C2", "missing_pct": 0.0, "unique_values": 3, "mean": 0.8157123834886818, "std": 0.9462385775683052}, {"feature": "C3", "missing_pct": 55.58, "unique_values": 3, "mean": 2.015187849720224, "std": 7.796569581959519}]}, {"group": "Socioeconomic", "features": [{"feature": "equivalized_income", "missing_pct": 0.0, "unique_values": 403, "mean": 8760.87797514338, "std": 8523.663318653564}]}, {"group": "Quantile-regression", "features": [{"feature": "floor_area", "missing_pct": 0.0, "unique_values": 6, "mean": 89.5855304039059, "std": 42.39316906241871}, {"feature": "house_age", "missing_pct": 0.0, "unique_values": 8, "mean": 43.0110075454949, "std": 18.97471084234113}, {"feature": "dwelling_type", "missing_pct": 0.0, "unique_values": 4, "mean": 2.356946293830448, "std": 1.2976609390311185}, {"feature": "insulation_count", "missing_pct": 0.0, "unique_values": 4, "mean": 0.6898357745228584, "std": 0.8520887498302377}, {"feature": "main_heating_source", "missing_pct": 0.0, "unique_values": 11, "mean": null, "std": null}, {"feature": "household_size", "missing_pct": 0.0, "unique_values": 23, "mean": 2.709098979138926, "std": 1.6055909660857792}]}];
    let active = 0;
    const tabs = document.getElementById('tabs');
    const grid = document.getElementById('grid');

    function render() {
      tabs.innerHTML = '';
      grid.innerHTML = '';
      story.forEach((group, idx) => {
        const button = document.createElement('button');
        button.className = 'tab' + (idx === active ? ' active' : '');
        button.textContent = group.group;
        button.onclick = () => { active = idx; render(); };
        tabs.appendChild(button);
      });

      story[active].features.forEach((feature) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <h3>${feature.feature}</h3>
          <div class="meta">Missing: ${feature.missing_pct}%</div>
          <div class="meta">Unique values: ${feature.unique_values}</div>
          <div class="meta">Mean: ${feature.mean === null ? 'n/a' : Number(feature.mean).toFixed(3)}</div>
          <div class="meta">Std: ${feature.std === null ? 'n/a' : Number(feature.std).toFixed(3)}</div>
        `;
        grid.appendChild(card);
      });
    }

    render();
    setInterval(() => { active = (active + 1) % story.length; render(); }, 3200);
  </script>
</body>
</html>
