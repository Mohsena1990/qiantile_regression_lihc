<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Model Metric Story</title>
  <style>
    body { font-family: 'Trebuchet MS', sans-serif; margin: 0; background: #fffaf0; color: #1b1b1b; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 24px 56px; }
    h1 { margin-bottom: 8px; }
    .dataset { font-size: 20px; font-weight: bold; color: #0d47a1; margin: 18px 0; }
    .chart { display: grid; gap: 12px; }
    .bar-row { display: grid; grid-template-columns: 320px 1fr 100px; align-items: center; gap: 12px; }
    .bar-label { font-weight: 600; }
    .bar-track { background: #dfe7eb; border-radius: 999px; overflow: hidden; height: 26px; }
    .bar-fill { background: linear-gradient(90deg, #43a047, #1e88e5); height: 100%; width: 0%; transition: width 0.8s ease; }
    .bar-value { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Animated Best-Model Metric Story</h1>
    <p>The dashboard cycles through datasets and shows the best test macro-F1 ranking across model families, together with the selected <code>k</code>.</p>
    <div id="dataset" class="dataset"></div>
    <div id="chart" class="chart"></div>
  </div>
  <script>
    const rows = [{"dataset": "hqrtm_q60", "model_name": "B4_structural_context_socioeconomic", "k": 4, "test_macro_f1": 0.6139006299644914, "test_accuracy": 0.7635782747603834}, {"dataset": "hqrtm_q60", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.5177860975243745, "test_accuracy": 0.7099751508697195}, {"dataset": "hqrtm_q60", "model_name": "B3_structural_context", "k": 4, "test_macro_f1": 0.4456478355020634, "test_accuracy": 0.6180333688320909}, {"dataset": "hqrtm_q60", "model_name": "B1_structural", "k": 4, "test_macro_f1": 0.3615977445695606, "test_accuracy": 0.5385161519346823}, {"dataset": "hqrtm_q65", "model_name": "B4_structural_context_socioeconomic", "k": 3, "test_macro_f1": 0.5863031217896174, "test_accuracy": 0.7866524671636492}, {"dataset": "hqrtm_q65", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.4828514414517608, "test_accuracy": 0.6719914802981896}, {"dataset": "hqrtm_q65", "model_name": "B3_structural_context", "k": 4, "test_macro_f1": 0.4392697488257403, "test_accuracy": 0.6325878594249201}, {"dataset": "hqrtm_q65", "model_name": "B1_structural", "k": 2, "test_macro_f1": 0.3537485354415888, "test_accuracy": 0.521476748313809}, {"dataset": "hqrtm_q70", "model_name": "B4_structural_context_socioeconomic", "k": 2, "test_macro_f1": 0.5754161675689703, "test_accuracy": 0.7436989705360313}, {"dataset": "hqrtm_q70", "model_name": "B2_structural_socioeconomic", "k": 3, "test_macro_f1": 0.505498668984338, "test_accuracy": 0.741924032658857}, {"dataset": "hqrtm_q70", "model_name": "B3_structural_context", "k": 2, "test_macro_f1": 0.415153211666584, "test_accuracy": 0.6123535676251332}, {"dataset": "hqrtm_q70", "model_name": "B1_structural", "k": 2, "test_macro_f1": 0.3569050031109506, "test_accuracy": 0.5548455804046858}, {"dataset": "traditional_lihc", "model_name": "B4_structural_context_socioeconomic", "k": 3, "test_macro_f1": 0.5576533219770865, "test_accuracy": 0.7589634362797302}, {"dataset": "traditional_lihc", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.5103239573004362, "test_accuracy": 0.7096201632942847}, {"dataset": "traditional_lihc", "model_name": "B3_structural_context", "k": 2, "test_macro_f1": 0.4189256554648056, "test_accuracy": 0.6372026979055733}, {"dataset": "traditional_lihc", "model_name": "B1_structural", "k": 2, "test_macro_f1": 0.3523958268635304, "test_accuracy": 0.5321263755768548}];
    const datasets = [...new Set(rows.map(r => r.dataset))];
    let datasetIndex = 0;

    function render() {
      const dataset = datasets[datasetIndex];
      const datasetRows = rows.filter(r => r.dataset === dataset).sort((a, b) => b.test_macro_f1 - a.test_macro_f1);
      document.getElementById('dataset').textContent = dataset;
      const chart = document.getElementById('chart');
      chart.innerHTML = '';
      datasetRows.forEach((row) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'bar-row';
        wrapper.innerHTML = `
          <div class="bar-label">${row.model_name} | k=${row.k}</div>
          <div class="bar-track"><div class="bar-fill"></div></div>
          <div class="bar-value">${row.test_macro_f1.toFixed(3)}</div>
        `;
        chart.appendChild(wrapper);
        requestAnimationFrame(() => {
          wrapper.querySelector('.bar-fill').style.width = `${Math.max(4, row.test_macro_f1 * 100)}%`;
        });
      });
    }

    function nextDataset() { datasetIndex = (datasetIndex + 1) % datasets.length; render(); }
    render();
    setInterval(nextDataset, 2800);
  </script>
</body>
</html>
