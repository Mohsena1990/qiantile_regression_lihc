<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Model Metric Story</title>
  <style>
    body { font-family: 'Trebuchet MS', sans-serif; margin: 0; background: #fffaf0; color: #1b1b1b; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 30px 24px 56px; }
    h1 { margin-bottom: 8px; }
    .dataset { font-size: 20px; font-weight: bold; color: #0d47a1; margin: 18px 0; }
    .chart { display: grid; gap: 12px; }
    .bar-row { display: grid; grid-template-columns: 320px 1fr 100px; align-items: center; gap: 12px; }
    .bar-label { font-weight: 600; }
    .bar-track { background: #dfe7eb; border-radius: 999px; overflow: hidden; height: 26px; }
    .bar-fill { background: linear-gradient(90deg, #43a047, #1e88e5); height: 100%; width: 0%; transition: width 0.8s ease; }
    .bar-value { text-align: right; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Animated Best-Model Metric Story</h1>
    <p>The dashboard cycles through datasets and shows the best test macro-F1 ranking across model families, together with the selected <code>k</code>.</p>
    <div id="dataset" class="dataset"></div>
    <div id="chart" class="chart"></div>
  </div>
  <script>
    const rows = [{"dataset": "hqrtm_q60", "model_name": "B4_structural_context_socioeconomic", "k": 2, "test_macro_f1": 0.5839366870689924, "test_accuracy": 0.7223997160099397}, {"dataset": "hqrtm_q60", "model_name": "B2_structural_socioeconomic", "k": 3, "test_macro_f1": 0.5459885519020267, "test_accuracy": 0.7532836350727724}, {"dataset": "hqrtm_q60", "model_name": "B3_structural_context", "k": 4, "test_macro_f1": 0.4448247485462998, "test_accuracy": 0.6116435924742634}, {"dataset": "hqrtm_q60", "model_name": "B1_structural", "k": 4, "test_macro_f1": 0.3610926573214144, "test_accuracy": 0.5473908413205538}, {"dataset": "hqrtm_q65", "model_name": "B4_structural_context_socioeconomic", "k": 3, "test_macro_f1": 0.5752361644204409, "test_accuracy": 0.7305644302449414}, {"dataset": "hqrtm_q65", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.529128517656607, "test_accuracy": 0.762158324458644}, {"dataset": "hqrtm_q65", "model_name": "B3_structural_context", "k": 4, "test_macro_f1": 0.4249630143072124, "test_accuracy": 0.6219382321618744}, {"dataset": "hqrtm_q65", "model_name": "B1_structural", "k": 3, "test_macro_f1": 0.363307076479376, "test_accuracy": 0.5669151579694711}, {"dataset": "hqrtm_q70", "model_name": "B4_structural_context_socioeconomic", "k": 2, "test_macro_f1": 0.5627694229810319, "test_accuracy": 0.7319843805466809}, {"dataset": "hqrtm_q70", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.5125588356639216, "test_accuracy": 0.7816826411075612}, {"dataset": "hqrtm_q70", "model_name": "B3_structural_context", "k": 3, "test_macro_f1": 0.4067587821455252, "test_accuracy": 0.5942492012779552}, {"dataset": "hqrtm_q70", "model_name": "B1_structural", "k": 2, "test_macro_f1": 0.3513305942203145, "test_accuracy": 0.5608803691870784}, {"dataset": "traditional_lihc", "model_name": "B4_structural_context_socioeconomic", "k": 3, "test_macro_f1": 0.5431284917289568, "test_accuracy": 0.7763578274760383}, {"dataset": "traditional_lihc", "model_name": "B2_structural_socioeconomic", "k": 4, "test_macro_f1": 0.5160153807031912, "test_accuracy": 0.7490237841675541}, {"dataset": "traditional_lihc", "model_name": "B3_structural_context", "k": 3, "test_macro_f1": 0.4107451798833548, "test_accuracy": 0.6261980830670927}, {"dataset": "traditional_lihc", "model_name": "B1_structural", "k": 2, "test_macro_f1": 0.3522752758513985, "test_accuracy": 0.5264465743698971}];
    const datasets = [...new Set(rows.map(r => r.dataset))];
    let datasetIndex = 0;

    function render() {
      const dataset = datasets[datasetIndex];
      const datasetRows = rows.filter(r => r.dataset === dataset).sort((a, b) => b.test_macro_f1 - a.test_macro_f1);
      document.getElementById('dataset').textContent = dataset;
      const chart = document.getElementById('chart');
      chart.innerHTML = '';
      datasetRows.forEach((row) => {
        const wrapper = document.createElement('div');
        wrapper.className = 'bar-row';
        wrapper.innerHTML = `
          <div class="bar-label">${row.model_name} | k=${row.k}</div>
          <div class="bar-track"><div class="bar-fill"></div></div>
          <div class="bar-value">${row.test_macro_f1.toFixed(3)}</div>
        `;
        chart.appendChild(wrapper);
        requestAnimationFrame(() => {
          wrapper.querySelector('.bar-fill').style.width = `${Math.max(4, row.test_macro_f1 * 100)}%`;
        });
      });
    }

    function nextDataset() { datasetIndex = (datasetIndex + 1) % datasets.length; render(); }
    render();
    setInterval(nextDataset, 2800);
  </script>
</body>
</html>
