<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Pipeline Flow</title>
  <style>
    body { font-family: Georgia, serif; margin: 0; background: linear-gradient(135deg, #f4efe6, #dbe8f2); color: #102027; }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 32px 24px 56px; }
    h1 { margin-bottom: 8px; }
    p.lead { font-size: 18px; max-width: 820px; }
    .timeline { display: grid; gap: 18px; margin-top: 28px; }
    .step { background: rgba(255,255,255,0.82); border: 2px solid transparent; border-radius: 18px; padding: 18px 20px; box-shadow: 0 12px 30px rgba(16,32,39,0.08); opacity: 0.45; transform: translateX(16px); transition: 0.45s ease; }
    .step.active { opacity: 1; transform: translateX(0); border-color: #1e88e5; }
    .step h2 { margin: 0 0 8px; font-size: 22px; }
    .controls { margin-top: 20px; display: flex; gap: 12px; }
    button { border: 0; background: #102027; color: white; padding: 10px 14px; border-radius: 999px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Dynamic Pipeline Flow</h1>
    <p class="lead">This animated flowchart walks through the leakage-safe labeling, grouped validation, CatBoost tuning, fit diagnostics, and reporting steps used in the LIHC/HQRTM pipeline.</p>
    <div id="timeline" class="timeline"></div>
    <div class="controls">
      <button onclick="previousStep()">Previous</button>
      <button onclick="nextStep()">Next</button>
    </div>
  </div>
  <script>
    const steps = [{"title": "Raw Input", "description": "Start from the cleaned household-level survey table and keep the core expenditure and income fields."}, {"title": "Leakage-safe Split", "description": "Create train and test splits before target construction so threshold fitting and quantile labeling stay honest."}, {"title": "Dataset Labels", "description": "Build traditional LIHC and HQRTM labels with train-only fits, then apply them to both train and test."}, {"title": "Feature Blocks", "description": "Assemble structural, context, socioeconomic, and quantile-regression feature sets for the baseline families."}, {"title": "Grouped CV", "description": "Run country-aware grouped folds so entire countries stay inside one side of each split."}, {"title": "Tuning", "description": "Tune CatBoost on fold-level validation performance while keeping the imbalance strategy consistent."}, {"title": "Fold Diagnostics", "description": "Save train metrics, validation metrics, confusion matrices, and learning curves for every fold."}, {"title": "Final Model", "description": "Refit on the full training split, save final train-versus-test metrics, and export summary tables."}, {"title": "Storytelling", "description": "Turn the saved artifacts into static and dynamic visual diagnostics for reporting and README integration."}];
    const timeline = document.getElementById('timeline');
    let activeIndex = 0;

    function render() {
      timeline.innerHTML = '';
      steps.forEach((step, idx) => {
        const card = document.createElement('div');
        card.className = 'step' + (idx === activeIndex ? ' active' : '');
        card.innerHTML = `<h2>${idx + 1}. ${step.title}</h2><p>${step.description}</p>`;
        timeline.appendChild(card);
      });
    }

    function nextStep() { activeIndex = (activeIndex + 1) % steps.length; render(); }
    function previousStep() { activeIndex = (activeIndex - 1 + steps.length) % steps.length; render(); }
    render();
    setInterval(nextStep, 2600);
  </script>
</body>
</html>
